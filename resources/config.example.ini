# KeyRecord 配置文件示例
#
# 用法：把本文件复制为  ~/.config/keyrecord/config.ini  后按需修改。
#   Windows 下 ~ 即 %USERPROFILE%，完整路径通常是
#   C:\Users\<你的用户名>\.config\keyrecord\config.ini
#
# 规则：
#   - 不写的项会自动使用内置默认值；整个文件缺失也没关系。
#   - 以 # 或 ; 开头的整行是注释。
#   - 优先级：内置默认值 < 本配置文件 < 命令行参数。
#   - 节名/键名大小写不敏感。

[server]
# 服务端监听地址，默认 0.0.0.0（监听所有网卡；仅本机访问可设为 127.0.0.1）
# address = 0.0.0.0

# 服务端监听端口，默认 3000（取值范围 1..65535）
# port = 3000

[storage]
# 数据库文件的完整路径；设置后采集端与服务端都会使用它。
# db_path = ~/.config/keyrecord/keyrecord.db

# 或者只指定目录，文件名固定为 keyrecord.db（db_path 优先于 db_dir）。
# db_dir = ~/.config/keyrecord
